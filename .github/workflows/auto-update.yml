name: Auto Update Soundboard

on:
  push:
    paths:
      - 'Sons/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Scanner le dossier et sécuriser les noms
        run: |
          TIMESTAMP=$(date +%s)
          sed -i "s/const LAUNCH_TIME = .*/const LAUNCH_TIME = '$TIMESTAMP';/g" sw.js
          
          # On utilise "jq" pour formater la liste en tableau Javascript parfait (gère tous les caractères)
          echo -n "self.SOUNDS_LIST = " > sounds-config.js
          cd sons && find . -type f -name "*.mp3" | sed 's/^\.\///' | jq -R . | jq -s . >> ../sounds-config.js
          echo ";" >> ../sounds-config.js

      - name: Sauvegarder les modifications sur GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sounds-config.js sw.js
          git commit -m "🤖 Robot : Correction ultime des apostrophes [skip ci]" || exit 0
          git push
