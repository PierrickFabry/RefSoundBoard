<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Soundboard</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="Icones/icone-512.png">
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #222; color: white; padding: 20px; }
        
        /* Barre de recherche et Filtre */
        .filters { display: flex; flex-direction: column; gap: 10px; max-width: 400px; margin: 0 auto 20px auto; }
        #search-bar, #category-filter { padding: 15px; font-size: 16px; border-radius: 25px; border: none; text-align: center; outline: none; background-color: #333; color: white; }

        /* Grille principale */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        
        /* Conteneur d'un son (Bouton play + Étoile) */
        .sound-card { display: flex; gap: 5px; }
        
        /* Bouton Play */
        .play-btn { background-color: #ff5e3a; color: white; border: none; padding: 20px 10px; font-size: 16px; border-radius: 10px; cursor: pointer; flex-grow: 1; box-shadow: 0 4px 6px rgba(0,0,0,0.3); word-wrap: break-word; }
        .play-btn:active { background-color: #e04e2a; transform: scale(0.95); }
        
        /* Bouton Favori */
        .fav-btn { background-color: #444; color: #888; border: none; width: 45px; font-size: 22px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .fav-btn.active { color: #ffcc00; /* Étoile dorée */ }
    </style>
</head>
<body>

    <h1>🔊 Ma Soundboard</h1>
    
    <div class="filters">
        <input type="text" id="search-bar" placeholder="🔍 Rechercher un son..." />
        <select id="category-filter">
            <option value="all">Toutes les catégories</option>
            </select>
    </div>
    
    <div class="grid" id="soundboard-grid">
        </div>

    <script src="sounds-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
